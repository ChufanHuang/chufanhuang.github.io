<script>
(() => {
  const btns = document.querySelectorAll('.filterbar .chip');
  const cards = document.querySelectorAll('.post-card');
  function apply(cat){
    btns.forEach(b => b.classList.toggle('active', b.dataset.filter===cat));
    cards.forEach(c => c.hidden = !(cat==='ALL' || (c.dataset.cat||'').toUpperCase()===cat.toUpperCase()));
  }
  btns.forEach(b => b.addEventListener('click', () => apply(b.dataset.filter)));
  apply('ALL');
})();
</script>
