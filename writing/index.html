<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Writing · Chufan Huang</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <style>
    /* “Coming soon” 贴纸（顶栏） */
    .site-nav .page-link.soon{ position:relative; }
    .site-nav .page-link.soon::after{
      content:"Coming soon";
      position:absolute; top:-14px; left:50%; transform:translateX(-50%);
      font-weight:800; font-size:.82rem; color:#fff; background:#23360F;
      padding:6px 12px; border-radius:10px; box-shadow:0 8px 24px rgba(0,0,0,.12);
      white-space:nowrap;
    }
    .site-nav .page-link.soon::before{
      content:""; position:absolute; top:14px; left:50%; transform:translateX(-50%) rotate(45deg);
      width:10px; height:10px; background:#23360F; border-radius:2px;
    }
  </style>
</head>
<body>

<!-- head 里替换 CSS 引用，给一个时间戳避免缓存 -->
<link rel="stylesheet" href="/assets/css/main.css?v=1755811187">

<header class="site-header">
  <div class="wrapper">
    <a class="site-title" href="/">Chufan Huang</a>
    <nav class="site-nav">
      <a class="page-link"
         href="/">About</a>
      <a class="page-link"
         href="/experience/">Research experiences</a>
      <a class="page-link"
         href="/publications/">Publications</a>
      <!-- Writing 先不显示，如需恢复再加回来 -->
    </nav>
  </div>
</header>


<main class="page-content" aria-label="Content">
  <div class="wrapper">
    <div class="filterbar">
  <button class="chip active" data-filter="ALL">All</button>
  <button class="chip" data-filter="essay">Essay</button>
  <button class="chip" data-filter="note">Research Note</button>
  <button class="chip" data-filter="reading">Reading</button>
  <button class="chip" data-filter="zh">中文</button>
</div>

<ul class="post-list">
  
  
  <li class="post-card" data-cat="note">
    <h3><a href="/note/2025/03/01/peaks-method-notes/">From Peaks to Trajectories — methods notes</a></h3>
    <div class="meta">Mar 1, 2025 · Note</div>
    <p>
</p>
  </li>
  
</ul>

<script>
(() => {
  const btns = document.querySelectorAll('.filterbar .chip');
  const cards = document.querySelectorAll('.post-card');
  function apply(cat){
    btns.forEach(b => b.classList.toggle('active', b.dataset.filter===cat));
    cards.forEach(c => c.hidden = !(cat==='ALL' || (c.dataset.cat||'').toUpperCase()===cat.toUpperCase()));
  }
  btns.forEach(b => b.addEventListener('click', () => apply(b.dataset.filter)));
  apply('ALL');
})();
</script>


  </div>
</main>

<footer class="site-footer">
  <div class="wrapper">
    <small>© 2025 Chufan Huang</small>
  </div>
</footer>


<script>
  (function(){
    // 根据 URL 给当前项加 active
    const path = location.pathname.replace(/\/$/, '');
    document.querySelectorAll('.site-nav .page-link').forEach(a=>{
      const href = a.getAttribute('href').replace(/\/$/, '');
      if (href === '/' ? path === '' : path.startsWith(href)) a.classList.add('active');
    });
  })();
</script>

</body>
</html>
